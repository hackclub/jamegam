<!--
  Jame Gam: "Sign in with Hack Club" for a Fillout submission form.

  SETUP (once per jam's form):
  1. Add these HIDDEN fields to the form, each set to "prefill from URL parameter"
     with the parameter name matching exactly:
        email, first_name, last_name, slack_id, slack_handle,
        verification_status, hca_token
     (hca_token is the verified, un-forgeable identity token - keep it; don't show it.)
     slack_avatar also comes in the URL but is display-only - no hidden field needed.
  2. Put signin.css into Fillout's custom CSS slot, and this block into a custom
     HTML/embed element at the TOP of the form. If your HTML element strips
     <script>, move just the <script> contents into Fillout's custom-JS slot.
  3. That's it. The button self-references this form's URL, so the same snippet
     works on every future jam form with no changes.

  Flow: click -> Hack Club Auth (auto-skips consent for returning users) ->
  back here with the hidden fields prefilled and the button swapped to a
  "signed in as ..." card.
-->
<div id="hc-signin"></div>
<script>
(function () {
  // Where the OAuth broker lives (the jamegam.hackclub.com SvelteKit backend).
  var BROKER = 'https://jamegam.hackclub.com/api/auth/login';

  var root = document.getElementById('hc-signin');
  if (!root) return;

  var q = new URLSearchParams(location.search);
  var token = q.get('hca_token');

  if (token) {
    // Returned from Hack Club Auth - hidden fields are already prefilled.
    var name = [q.get('first_name'), q.get('last_name')].filter(Boolean).join(' ');
    var email = q.get('email') || '';
    var handle = q.get('slack_handle') || '';
    var avatar = q.get('slack_avatar') || '';
    var who = name || handle || email;
    var sub = handle ? ('@' + handle) : email;
    root.innerHTML =
      '<div class="hc-card">' +
        (avatar ? '<img class="hc-av" src="' + esc(avatar) + '" alt="" />' : '') +
        '<div class="hc-meta">' +
          '<div class="hc-name">' + esc(who) + '</div>' +
          (sub && sub !== who ? '<div class="hc-sub">' + esc(sub) + '</div>' : '') +
        '</div>' +
        '<span class="hc-badge">✓ signed in</span>' +
      '</div>';
  } else {
    // Not signed in yet. `to` = this form's clean URL (no query), so we come
    // straight back here afterward.
    var here = location.origin + location.pathname;
    var url = BROKER + '?to=' + encodeURIComponent(here);
    root.innerHTML =
      '<a class="hc-btn" href="' + url + '">Sign in with Hack Club</a>' +
      (q.get('hca_error')
        ? '<div class="hc-err">Sign-in didn’t go through - give it another try.</div>'
        : '');
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
})();
</script>
